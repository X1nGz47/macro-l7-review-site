<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宏观 L7 刷题页</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #17202d;
      --muted: #607081;
      --line: #d6dfea;
      --blue: #1e6da1;
      --green: #25855d;
      --red: #b4455e;
      --gold: #c98e19;
      --shadow: 0 10px 28px rgba(23, 32, 45, 0.08);
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #eff4fa 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }
    .page {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }
    .hero, .panel, .question-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .hero, .panel { padding: 20px; }
    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 38px);
      line-height: 1.1;
    }
    .hero p, .panel p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }
    .layout {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }
    .sidebar, .main { display: grid; gap: 16px; }
    .toolbar { display: grid; gap: 12px; }
    .toolbar button, .action-btn, .choice-btn {
      border-radius: var(--radius);
      border: 1px solid var(--line);
      cursor: pointer;
      font-size: 14px;
      transition: 0.15s ease;
    }
    .action-btn {
      background: var(--blue);
      color: #fff;
      padding: 12px 14px;
    }
    .action-btn.secondary {
      background: #f8fbff;
      color: var(--text);
    }
    select, input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .stat-box {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: #fbfdff;
    }
    .stat-box strong {
      display: block;
      font-size: 22px;
      margin-bottom: 6px;
    }
    .stat-box span {
      color: var(--muted);
      font-size: 13px;
    }
    .question-list { display: grid; gap: 14px; }
    .question-card {
      padding: 18px;
      display: grid;
      gap: 14px;
    }
    .question-head {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      color: #fff;
    }
    .b-is { background: var(--blue); }
    .b-lm { background: var(--green); }
    .b-joint { background: var(--gold); }
    .question-title {
      margin: 0;
      font-size: 18px;
      line-height: 1.6;
    }
    .choices, .answer-box { display: grid; gap: 10px; }
    .choice-btn {
      padding: 12px 14px;
      background: #fbfdff;
      color: var(--text);
      text-align: left;
    }
    .choice-btn.selected {
      border-color: var(--blue);
      background: #edf6ff;
    }
    .choice-btn.correct {
      border-color: var(--green);
      background: #eefbf5;
    }
    .choice-btn.wrong {
      border-color: var(--red);
      background: #fff2f5;
    }
    .feedback {
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.7;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.ok {
      background: #eefbf5;
      border: 1px solid #c9ebd9;
    }
    .feedback.bad {
      background: #fff2f5;
      border: 1px solid #edc6d1;
    }
    .feedback-block {
      margin-top: 8px;
    }
    .feedback-label {
      font-weight: 700;
      color: var(--text);
    }
    .hint {
      color: var(--muted);
      font-size: 13px;
    }
    .summary { display: none; gap: 12px; }
    .summary.show { display: grid; }
    .summary ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.8;
      font-size: 14px;
    }
    .link {
      color: var(--blue);
      text-decoration: none;
      font-size: 14px;
    }
    .link-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .inline-note {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }
    @media (max-width: 920px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <h1>宏观 L7 刷题页</h1>
      <p>题目依据：<strong>宏观 L7 第十一章《国民收入的决定：IS-LM 模型》</strong>。当前题目按课件知识点整理，<strong>不是根据历年题风格拟合</strong>，因为你这次还没有上传往年题。</p>
    </section>
    <div class="layout">
      <aside class="sidebar">
        <section class="panel toolbar">
          <label>
            <div style="margin-bottom:8px;font-size:14px;">选择题目范围</div>
            <select id="topicFilter">
              <option value="全部">全部</option>
              <option value="IS">只刷 IS</option>
              <option value="LM">只刷 LM</option>
              <option value="IS-LM">只刷 IS-LM</option>
            </select>
          </label>
          <button id="restartBtn" class="action-btn">重新开始本轮练习</button>
          <button id="wrongOnlyBtn" class="action-btn secondary">只看错题</button>
        </section>
        <section class="panel">
          <h2 style="margin:0 0 12px;font-size:18px;">做题统计</h2>
          <div class="stat-grid">
            <div class="stat-box"><strong id="doneCount">0</strong><span>已作答</span></div>
            <div class="stat-box"><strong id="correctCount">0</strong><span>答对</span></div>
            <div class="stat-box"><strong id="wrongCount">0</strong><span>答错</span></div>
            <div class="stat-box"><strong id="accuracyText">0%</strong><span>正确率</span></div>
          </div>
        </section>
        <section class="panel summary" id="summaryBox">
          <h2 style="margin:0;font-size:18px;">复盘提示</h2>
          <ul id="summaryList"></ul>
        </section>
        <section class="panel">
          <p>先看知识卡片，再回来刷题，效果会更稳。</p>
          <div class="link-list">
            <a class="link" href="./index.html">返回导航首页</a>
            <a class="link" href="./macro_l7_cards.html">打开知识卡片页</a>
            <a class="link" href="./macro_l7_wrongbook.html">打开错题本页</a>
          </div>
          <p class="inline-note">当前浏览器已记录 <strong id="wrongBookCountText">0</strong> 道错题。</p>
        </section>
      </aside>
      <main class="main">
        <section id="questionList" class="question-list"></section>
      </main>
    </div>
  </div>
  <script src="./macro_l7_questions.js"></script>
  <script>
    const questionBank = window.macroL7QuestionBank || [];
    const WRONG_BOOK_KEY = "macroL7WrongBook";
    const state = {};
    let showWrongOnly = false;
    let wrongBook = loadWrongBook();
    const topicFilter = document.getElementById("topicFilter");
    const questionList = document.getElementById("questionList");
    const doneCount = document.getElementById("doneCount");
    const correctCount = document.getElementById("correctCount");
    const wrongCount = document.getElementById("wrongCount");
    const accuracyText = document.getElementById("accuracyText");
    const summaryBox = document.getElementById("summaryBox");
    const summaryList = document.getElementById("summaryList");
    const wrongBookCountText = document.getElementById("wrongBookCountText");

    function escapeHtml(text) {
      return String(text).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }

    function loadWrongBook() {
      try {
        return JSON.parse(localStorage.getItem(WRONG_BOOK_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function saveWrongBook() {
      localStorage.setItem(WRONG_BOOK_KEY, JSON.stringify(wrongBook));
      wrongBookCountText.textContent = Object.keys(wrongBook).length;
    }

    function formatCorrectAnswer(q) {
      if (q.type === "single" || q.type === "judge") {
        return `${String.fromCharCode(65 + q.answer)}. ${q.options[q.answer]}`;
      }
      if (q.type === "fill") {
        return q.blanks.join(" / ");
      }
      return "";
    }

    function formatUserAnswer(q, record) {
      if (q.type === "single" || q.type === "judge") {
        if (record.selected === undefined) return "未作答";
        return `${String.fromCharCode(65 + record.selected)}. ${q.options[record.selected]}`;
      }
      if (q.type === "fill") {
        return (record.inputs || []).join(" / ") || "未作答";
      }
      return "未作答";
    }

    function buildFeedback(q, record) {
      if (record.result === undefined) return "";
      return `
        <div class="feedback-block"><span class="feedback-label">正确答案：</span>${escapeHtml(formatCorrectAnswer(q))}</div>
        <div class="feedback-block"><span class="feedback-label">解析：</span>${escapeHtml(q.explanation)}</div>
        <div class="feedback-block"><span class="feedback-label">经济直觉：</span>${escapeHtml(q.intuition || "这题暂无额外直觉说明。")}</div>
      `;
    }

    function updateWrongBookEntry(q, record) {
      if (record.result !== false) return;
      const previous = wrongBook[q.id] || { wrongCount: 0 };
      wrongBook[q.id] = {
        id: q.id,
        topic: q.topic,
        wrongCount: previous.wrongCount + 1,
        lastWrongAt: new Date().toISOString(),
        lastWrongAtText: new Date().toLocaleString("zh-CN"),
        lastUserAnswer: formatUserAnswer(q, record)
      };
      saveWrongBook();
    }

    function getVisibleQuestions() {
      return questionBank.filter(q => {
        const topicOk = topicFilter.value === "全部" || q.topic === topicFilter.value;
        const wrongOnlyOk = !showWrongOnly || state[q.id]?.result === false;
        return topicOk && wrongOnlyOk;
      });
    }

    function renderQuestions() {
      const visible = getVisibleQuestions();
      questionList.innerHTML = "";
      if (!visible.length) {
        questionList.innerHTML = `<section class="panel"><p>当前没有可显示的题。可以切回“全部”，或者先做几道题再看错题。</p></section>`;
        return;
      }
      visible.forEach((q, index) => {
        const record = state[q.id] || {};
        const card = document.createElement("section");
        card.className = "question-card";
        const badgeClass = q.topic === "IS" ? "b-is" : q.topic === "LM" ? "b-lm" : "b-joint";
        card.innerHTML = `
          <div class="question-head">
            <span class="badge ${badgeClass}">${q.topic}</span>
            <span style="font-size:13px;color:var(--muted);">第 ${index + 1} 题</span>
          </div>
          <h2 class="question-title">${escapeHtml(q.question)}</h2>
          <div class="question-body"></div>
          <div class="feedback ${record.result === true ? "ok show" : record.result === false ? "bad show" : ""}">
            <strong>${record.result === false ? "回答不对。" : record.result === true ? "回答正确。" : ""}</strong>
            <div style="margin-top:6px;">${buildFeedback(q, record)}</div>
          </div>
        `;
        const body = card.querySelector(".question-body");
        if (q.type === "single" || q.type === "judge") {
          const wrap = document.createElement("div");
          wrap.className = "choices";
          q.options.forEach((option, optionIndex) => {
            const btn = document.createElement("button");
            btn.className = "choice-btn";
            if (record.selected === optionIndex) btn.classList.add("selected");
            if (record.result !== undefined && optionIndex === q.answer) btn.classList.add("correct");
            if (record.result === false && record.selected === optionIndex && optionIndex !== q.answer) btn.classList.add("wrong");
            btn.textContent = `${String.fromCharCode(65 + optionIndex)}. ${option}`;
            btn.addEventListener("click", () => {
              const record = { selected: optionIndex, result: optionIndex === q.answer };
              state[q.id] = record;
              updateWrongBookEntry(q, record);
              updateStats();
              renderQuestions();
            });
            wrap.appendChild(btn);
          });
          body.appendChild(wrap);
        }
        if (q.type === "fill") {
          const answerBox = document.createElement("div");
          answerBox.className = "answer-box";
          const inputIds = q.blanks.map((_, i) => `q_${q.id}_${i}`);
          answerBox.innerHTML = `
            ${q.blanks.map((_, i) => `<input id="${inputIds[i]}" type="text" placeholder="第 ${i + 1} 空" value="${record.inputs?.[i] || ""}" />`).join("")}
            <div class="hint">填空支持常见写法，比如箭头可填 ↑、↓，字母可填 k、h。</div>
            <button class="action-btn">提交这一题</button>
          `;
          answerBox.querySelector("button").addEventListener("click", () => {
            const inputs = inputIds.map(id => document.getElementById(id).value.trim());
            const normalized = inputs.map(v => v.replaceAll(" ", "").toLowerCase());
            const target = q.blanks.map(v => v.replaceAll(" ", "").toLowerCase());
            const ok = normalized.length === target.length && normalized.every((v, i) => v === target[i]);
            const record = { inputs, result: ok };
            state[q.id] = record;
            updateWrongBookEntry(q, record);
            updateStats();
            renderQuestions();
          });
          body.appendChild(answerBox);
        }
        questionList.appendChild(card);
      });
    }

    function updateStats() {
      const records = Object.values(state).filter(item => item.result !== undefined);
      const done = records.length;
      const correct = records.filter(item => item.result === true).length;
      const wrong = records.filter(item => item.result === false).length;
      const accuracy = done ? Math.round((correct / done) * 100) : 0;
      doneCount.textContent = done;
      correctCount.textContent = correct;
      wrongCount.textContent = wrong;
      accuracyText.textContent = `${accuracy}%`;
      const tips = [];
      const wrongTopics = new Map();
      questionBank.forEach(q => {
        if (state[q.id]?.result === false) {
          wrongTopics.set(q.topic, (wrongTopics.get(q.topic) || 0) + 1);
        }
      });
      if (wrongTopics.get("IS")) tips.push("IS 部分错题较多时，重点回看：负斜率、投资传导链、自发支出导致的右移。");
      if (wrongTopics.get("LM")) tips.push("LM 部分错题较多时，重点回看：货币需求三动机、L=kY-hr、货币供给变化导致的 LM 移动。");
      if (wrongTopics.get("IS-LM")) tips.push("IS-LM 联合题错得多时，重点回看：财政扩张与货币扩张对 Y 和 r 的方向影响。");
      if (wrong > 0) tips.push("最容易混淆的是“沿曲线移动”和“整条曲线移动”。");
      if (tips.length) {
        summaryBox.classList.add("show");
        summaryList.innerHTML = tips.map(line => `<li>${line}</li>`).join("");
      } else {
        summaryBox.classList.remove("show");
        summaryList.innerHTML = "";
      }
    }

    document.getElementById("restartBtn").addEventListener("click", () => {
      Object.keys(state).forEach(key => delete state[key]);
      showWrongOnly = false;
      document.getElementById("wrongOnlyBtn").textContent = "只看错题";
      updateStats();
      renderQuestions();
    });

    document.getElementById("wrongOnlyBtn").addEventListener("click", () => {
      showWrongOnly = !showWrongOnly;
      document.getElementById("wrongOnlyBtn").textContent = showWrongOnly ? "显示全部题" : "只看错题";
      renderQuestions();
    });

    topicFilter.addEventListener("change", renderQuestions);
    saveWrongBook();
    updateStats();
    renderQuestions();
  </script>
</body>
</html>
